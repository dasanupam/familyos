services:
  - type: web
    name: familyos-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: familyos
      - key: JWT_SECRET
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
